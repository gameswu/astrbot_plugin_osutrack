general: |
  OSU! 插件帮助（括号内为中文别名）

  账号管理:
    /osu link (绑定/关联) - 关联 OSU 账号
    /osu unlink (解绑/取消关联) - 解除账号关联

  查询功能:
    /osu me (我/个人) [模式] - 查看自己的信息
    /osu user (玩家/查询) <用户名/ID> [模式] [类型] - 查看指定用户信息
    /osu users (批量查询) - 批量查询用户信息（对话模式）
    /osu friend (好友) - 查看好友列表
    /osu map (谱面) <谱面ID> - 查看谱面信息
    /osu mapset (谱面集) <谱面集ID> - 查看谱面集信息
    /osu mapsets - 批量查询谱面集信息（对话模式）

  搜索功能:
    /osu search (搜索) map (谱面) <关键词> [单页数量] [页码] [高级搜索] - 查询谱面

  成绩统计功能:
    /osu update (更新/上传) [模式] - 上传成绩到 OSU!track（默认 osu 模式）
    /osu chart (图表/统计) [模式] [天数] [类型] - 查看成绩统计图表
    /osu best (最佳/bp) [模式] [数量] - 查看个人最佳成绩
    /osu recent (最近/rp) [模式] [数量] - 查看最近游玩成绩
    /osu scores (谱面排行) <谱面ID> [模式] - 查看谱面排行榜
    /osu score (成绩) <谱面ID> [模式] - 查看个人在谱面上的成绩
    /osu peak (巅峰/历史最佳) [模式] - 查看历史巅峰排名和准确率

  社区与信息:
    /osu ranking (排行/排名) [模式] [类型] - 查看排行榜
    /osu match (比赛) <比赛ID> - 查看比赛详情
    /osu mp (多人/房间) [房间ID] - 查看多人房间
    /osu news (新闻) [文章ID] - 查看 osu! 新闻
    /osu wiki (百科) <路径> - 查看 osu! Wiki
    /osu changelog (更新日志) [stream] - 查看 osu! 更新日志
    /osu team (团队) <团队ID> - 查看团队信息
    /osu packs (曲包) [类型] - 查看谱面包列表
    /osu fav (收藏) - 查看收藏谱面
    /osu events (事件) - 查看最近事件

  新闻推送:
    /osu news_subscribe (订阅新闻) - 订阅当前会话的新闻推送
    /osu news_unsubscribe (取消订阅新闻) - 取消当前会话的新闻推送

  帮助:
    /osu help (帮助) [命令] - 查看帮助信息

commands:
  LINK: |
    /osu link（别名: 绑定、关联）
    功能: 关联您的平台账号和 OSU! 账号。
    流程:
      1. 发送 /osu link 指令。
      2. 点击收到的授权链接，并在浏览器中授权。
      3. 将授权成功后跳转的页面 URL 完整复制并发送给机器人。
      4. 机器人会自动完成关联。
    注意: 如果已有关联，再次执行 link 将重新认证并更新权限。

  UNLINK: |
    /osu unlink（别名: 解绑、取消关联）
    功能: 解除当前平台账号与 OSU! 账号的关联。
    注意: 解除关联后，所有需要认证的功能将无法使用，直到重新关联。

  ME: |
    /osu me（别名: 我、个人）[模式]
    功能: 获取您当前关联的 OSU! 账号的详细信息。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为用户在官网设置的默认模式。
    示例:
      /osu me
      /osu me mania

  USER: |
    /osu user（别名: 玩家、查询）<用户名或ID> [模式] [类型]
    功能: 查询指定 OSU! 用户的详细信息。
    参数:
      - 用户名或ID (必须): 用户的数字 ID 或用户名。
      - 模式 (可选): osu, taiko, fruits, mania。
      - 类型 (可选): id, name。用于强制指定查询类型，不填则自动检测。
    示例:
      /osu user peppy
      /osu user 124493 taiko
      /osu user "some user name" name

  USERS: |
    /osu users（别名: 批量查询）
    功能: 批量查询多个用户的信息。
    流程:
      1. 发送 /osu users 指令。
      2. 按照提示，在下一条消息中发送用空格分隔的用户ID列表。
      3. 最多支持 50 个用户。

  FRIEND: |
    /osu friend（别名: 好友）
    功能: 获取您的 OSU! 好友列表。
    显示: 好友的头像、昵称、在线状态，并按互相关注和单向关注分类。
    权限要求: friends.read (请确保在 link 时已授权)

  UPDATE: |
    /osu update（别名: 更新、上传）[模式]
    功能: 将您最新的成绩信息上传到 OSU!track 网站进行统计。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为 osu。
    注意: OSU!track 是一个第三方成绩追踪网站。

  MAP: |
    /osu map（别名: 谱面）<谱面ID>
    功能: 查询指定谱面的详细信息。
    参数:
      - 谱面ID (必须): 谱面的数字 ID。
    示例:
      /osu map 129891

  MAPSET: |
    /osu mapset（别名: 谱面集）<谱面集ID>
    功能: 查询指定谱面集的详细信息，包含封面和所有难度。
    参数:
      - 谱面集ID (必须): 谱面集的数字 ID。
    示例:
      /osu mapset 41823

  MAPSETS: |
    /osu mapsets
    功能: 批量查询多个谱面集的信息。
    流程:
      1. 发送 /osu mapsets 指令。
      2. 按照提示，在下一条消息中发送用空格分隔的谱面集ID列表。
      3. 最多支持 20 个谱面集。

  SEARCH: |
    /osu search（别名: 搜索）map（别名: 谱面）<关键词> [单页数量] [页码] [高级搜索]
    功能: 搜索 OSU! 谱面集。
    参数:
      - 关键词 (必须): 搜索的关键词，可以是歌曲名、艺术家、制作者等。
      - 单页数量 (可选): 每页显示的结果数量，默认 5，最多 50。
      - 页码 (可选): 要查看的页码，从 1 开始。
      - 高级搜索 (可选): 使用高级搜索语法进行更精确的搜索。
    示例:
      /osu search map sotarks
      /osu search map "freedom dive" 10 2
      /osu search map ar=9 stars>=6
    高级搜索语法:
      - ar=X: 搜索 AR 为 X 的谱面
      - od=X: 搜索 OD 为 X 的谱面
      - cs=X: 搜索 CS 为 X 的谱面
      - hp=X: 搜索 HP 为 X 的谱面
      - stars>=X: 搜索星级大于等于 X 的谱面
      - bpm>=X: 搜索 BPM 大于等于 X 的谱面
      - length>X: 搜索长度大于 X 秒的谱面
      可以使用空格组合多个条件

  CHART: |
    /osu chart（别名: 图表、统计）[模式] [天数] [类型]
    功能: 查询您在 OSU!track 上的成绩统计图表信息。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为 osu。
      - 天数 (可选): 统计的天数范围，默认 30 天。
      - 类型 (可选): pp, rank, acc。默认为 pp。
    示例:
      /osu chart
      /osu chart taiko 60
      /osu chart mania 90 rank

  BEST: |
    /osu best（别名: 最佳、bp）[模式] [数量]
    功能: 查看您的个人最佳成绩（Best Performance）。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为 osu。
      - 数量 (可选): 显示成绩数量，范围 1-20，默认 5。
    示例:
      /osu best
      /osu best mania 10

  RECENT: |
    /osu recent（别名: 最近、rp）[模式] [数量]
    功能: 查看您的最近游玩成绩（包含失败成绩）。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为 osu。
      - 数量 (可选): 显示成绩数量，范围 1-20，默认 5。
    示例:
      /osu recent
      /osu recent taiko 3

  SCORES: |
    /osu scores（别名: 谱面排行）<谱面ID> [模式]
    功能: 查看指定谱面的排行榜（前 10 名）。
    参数:
      - 谱面ID (必须): 谱面的数字 ID。
      - 模式 (可选): osu, taiko, fruits, mania。
    示例:
      /osu scores 129891
      /osu scores 129891 osu

  SCORE: |
    /osu score（别名: 成绩）<谱面ID> [模式]
    功能: 查看您在指定谱面上的最佳成绩及排名。
    参数:
      - 谱面ID (必须): 谱面的数字 ID。
      - 模式 (可选): osu, taiko, fruits, mania。
    示例:
      /osu score 129891
      /osu score 129891 mania

  PEAK: |
    /osu peak（别名: 巅峰、历史最佳）[模式]
    功能: 查看您在 OSU!track 上记录的历史最佳全球排名和准确率。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为 osu。
    示例:
      /osu peak
      /osu peak taiko

  RANKING: |
    /osu ranking（别名: 排行、排名）[模式] [类型]
    功能: 查看指定模式和类型的排行榜（前 20 名）。
    参数:
      - 模式 (可选): osu, taiko, fruits, mania。默认为 osu。
      - 类型 (可选): performance, score, charts, country。默认为 performance。
    示例:
      /osu ranking
      /osu ranking mania score

  MATCH: |
    /osu match（别名: 比赛）<比赛ID>
    功能: 查看指定多人比赛的详情，包括最近的游戏记录。
    参数:
      - 比赛ID (必须): 比赛的数字 ID。
    示例:
      /osu match 12345

  MP: |
    /osu mp（别名: 多人、房间）[房间ID]
    功能: 查看多人游戏房间。不提供房间ID则显示房间列表。
    参数:
      - 房间ID (可选): 房间的数字 ID，提供则显示房间详情。
    示例:
      /osu mp
      /osu mp 12345

  NEWS: |
    /osu news（别名: 新闻）[文章ID或slug]
    功能: 查看 osu! 新闻。不提供参数则显示最新 10 条新闻列表。
    参数:
      - 文章ID或slug (可选): 新闻文章的数字ID或URL slug。
    示例:
      /osu news
      /osu news 1234

  WIKI: |
    /osu wiki（别名: 百科）<路径>
    功能: 查看 osu! Wiki 页面内容（中文版）。
    参数:
      - 路径 (必须): Wiki 页面路径。
    示例:
      /osu wiki Game_mode
      /osu wiki Ranking_criteria

  CHANGELOG: |
    /osu changelog（别名: 更新日志）[stream]
    功能: 查看 osu! 客户端的最近更新日志。
    参数:
      - stream (可选): 更新流，如 stable40, lazer 等。
    示例:
      /osu changelog
      /osu changelog lazer

  TEAM: |
    /osu team（别名: 团队）<团队ID>
    功能: 查看指定团队的信息和成员列表。
    参数:
      - 团队ID (必须): 团队的数字 ID。
    示例:
      /osu team 1

  PACKS: |
    /osu packs（别名: 曲包）[类型]
    功能: 查看谱面包列表。
    参数:
      - 类型 (可选): 谱面包类型筛选。
    示例:
      /osu packs

  FAV: |
    /osu fav（别名: 收藏）
    功能: 查看您收藏的谱面集列表。
    示例:
      /osu fav

  EVENTS: |
    /osu events（别名: 事件）
    功能: 查看 osu! 最近事件流。
    示例:
      /osu events

  NEWS_SUBSCRIBE: |
    /osu news_subscribe（别名: 订阅新闻）
    功能: 将当前会话（群聊/私聊）添加到 osu! 新闻推送列表。
    说明: 有新的 osu! 新闻发布时，将自动推送到已订阅的会话。
           推送模式可在配置中设置为实时 (realtime) 或定时 (scheduled)。
           需要管理员在配置中开启 news_push_enabled 才能生效。

  NEWS_UNSUBSCRIBE: |
    /osu news_unsubscribe（别名: 取消订阅新闻）
    功能: 将当前会话从 osu! 新闻推送列表中移除。